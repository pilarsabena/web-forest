<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;background:#f0f4ee;font-family:'Helvetica Neue',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f4ee;padding:40px 0;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

        <!-- HEADER -->
        <tr>
          <td style="background:linear-gradient(135deg,#2d4a35,#1a2e20);border-radius:20px 20px 0 0;padding:32px 40px;text-align:center;">
            <p style="margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:6px;color:#6ab04c;font-weight:600;">Notificación interna</p>
            <h1 style="margin:0;font-size:22px;font-weight:800;color:#ffffff;line-height:1.3;">Nueva reunión agendada</h1>
          </td>
        </tr>

        <!-- CUERPO -->
        <tr>
          <td style="background:#ffffff;padding:36px 40px;">

            <p style="margin:0 0 24px;font-size:15px;color:#445048;line-height:1.7;">
              Un cliente agendó una reunión desde la web. Detalles:
            </p>

            <!-- DATOS CLIENTE -->
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f4ee;border-radius:14px;border:1px solid #d4e0d4;margin-bottom:28px;">
              <tr>
                <td style="padding:18px 24px;border-bottom:1px solid #d4e0d4;">
                  <p style="margin:0 0 3px;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#7a8a7d;font-weight:600;">Cliente</p>
                  <p style="margin:0;font-size:16px;font-weight:700;color:#1a2620;">{{user_name}}</p>
                </td>
              </tr>
              <tr>
                <td style="padding:18px 24px;border-bottom:1px solid #d4e0d4;">
                  <p style="margin:0 0 3px;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#7a8a7d;font-weight:600;">Email</p>
                  <p style="margin:0;font-size:16px;font-weight:700;color:#1a2620;">{{user_email}}</p>
                </td>
              </tr>
              <tr>
                <td style="padding:18px 24px;border-bottom:1px solid #d4e0d4;">
                  <p style="margin:0 0 3px;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#7a8a7d;font-weight:600;">Fecha y hora</p>
                  <p style="margin:0;font-size:16px;font-weight:700;color:#1a2620;">{{fecha}} a las {{hora}} hs</p>
                </td>
              </tr>
              <tr>
                <td style="padding:18px 24px;">
                  <p style="margin:0 0 3px;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#7a8a7d;font-weight:600;">Consulta</p>
                  <p style="margin:0;font-size:15px;color:#1a2620;">{{booking_service}}</p>
                </td>
              </tr>
            </table>

            <!-- BOTÓN MEET -->
            <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:20px;">
              <tr>
                <td align="center">
                  <a href="{{meet_link}}" target="_blank"
                     style="display:inline-block;background:linear-gradient(135deg,#6ab04c,#4f7d5a);color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;padding:14px 36px;border-radius:50px;letter-spacing:0.3px;">
                    Unirse a Google Meet
                  </a>
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td style="background:#2d4a35;border-radius:0 0 20px 20px;padding:20px 40px;text-align:center;">
            <p style="margin:0;font-size:12px;color:#6a8a70;">Forest SRL · Sistema de reservas web</p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>

</body>
</html>
